name: Deploy to Hostinger

# Trigger otomatis setiap kali ada push ke branch main
on:
  push:
    branches:
      - main 

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Executing SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          # Perintah terminal yang akan dieksekusi di server Hostinger
          script: |
            # 1. Masuk ke folder root website Anda (sesuaikan path ini jika berbeda)
            cd domains/smartdrip-system.agrinex.io/public_html
            
            # 2. Ambil update terbaru dari GitHub
            git pull origin main
            
            # 3. [OPSIONAL] Jalankan command build/install sesuai framework Anda
            # Jika pakai Laravel:
            composer install --no-interaction --prefer-dist --optimize-autoloader
            php artisan optimize:clear
            
            # Jika pakai Node.js (Next/React/Vue):
            # npm install
            # npm run build