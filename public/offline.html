<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - AgriNex Smart Drip</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            color: white;
        }
        
        .container {
            text-align: center;
            max-width: 400px;
        }
        
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        
        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .button {
            display: inline-block;
            padding: 1rem 2rem;
            background: white;
            color: #16a34a;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .status {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            font-size: 0.9rem;
        }
        
        .online {
            color: #4ade80;
            font-weight: 600;
        }
        
        .offline {
            color: #fca5a5;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Anda Sedang Offline</h1>
        <p>
            Tidak dapat terhubung ke internet saat ini. 
            Silakan periksa koneksi Anda dan coba lagi.
        </p>
        <a href="/" class="button" onclick="location.reload(); return false;">
            Coba Lagi
        </a>
        
        <div class="status">
            Status: <span id="status" class="offline">Offline</span>
        </div>
    </div>

    <script>
        // Auto-reload when back online
        window.addEventListener('online', function() {
            document.getElementById('status').textContent = 'Online';
            document.getElementById('status').className = 'online';
            
            setTimeout(function() {
                location.reload();
            }, 1000);
        });
        
        window.addEventListener('offline', function() {
            document.getElementById('status').textContent = 'Offline';
            document.getElementById('status').className = 'offline';
        });
        
        // Check initial status
        if (navigator.onLine) {
            document.getElementById('status').textContent = 'Online';
            document.getElementById('status').className = 'online';
        }
    </script>
</body>
</html>
